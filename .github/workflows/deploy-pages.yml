# Build the static consumer site and deploy it to GitHub Pages on every
# push to master. The site is fully static: the frontend built in
# static-data mode plus the JSON snapshots exported by publish_static.py
# (committed under frontend/public/data). No backend, no secrets.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_STATIC_DATA: "1"
          # Custom domain (www.dishtune.com, via public/CNAME) serves the
          # site at the domain root, so the Vite base stays "/". The old
          # /IsItVegan/ base only applied to the github.io project URL.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_GOOGLE_ENABLED: ${{ vars.VITE_SUPABASE_GOOGLE_ENABLED }}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
