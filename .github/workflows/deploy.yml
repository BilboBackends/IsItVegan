# Build the static consumer site and deploy it to Cloudflare Pages on every
# push to master. The site is fully static: the frontend built in
# static-data mode plus the JSON snapshots exported by publish_static.py
# (committed under frontend/public/data). No backend, no secrets in the
# artifact. Cloudflare Pages replaced GitHub Pages so the repository can be
# private (GitHub free-plan Pages requires a public repo).
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Distinct from the legacy GH Pages workflow's "pages" group so the two
  # don't cancel each other while both exist during the cutover.
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_STATIC_DATA: "1"
          # Custom domain (dishtune.com) serves the site at the domain
          # root, so the Vite base stays "/".
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_GOOGLE_ENABLED: ${{ vars.VITE_SUPABASE_GOOGLE_ENABLED }}
          # OAuth client id, not a secret (it is embedded in the page and
          # visible to every visitor); the origin allowlist protects it.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
      # Cloudflare Pages caps deployment assets at 25 MiB per file. The raw
      # dish snapshot (60+ MiB) is only the fallback for browsers without
      # DecompressionStream; every modern browser loads dishes.json.gz.
      - run: rm -f frontend/dist/data/dishes.json
      - run: npx wrangler@4 pages deploy frontend/dist --project-name dishtune --branch master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
