project_id = "IsItVegan"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
auto_expose_new_tables = false

[db]
major_version = 17

[auth]
enabled = true
# The apex domain is canonical; the github.io URL stays allowed because old
# magic-link emails and bookmarks may still round-trip through it.
site_url = "https://dishtune.com/"
additional_redirect_urls = [
  "http://localhost:5173/",
  "http://127.0.0.1:5173/",
  "https://bilbobackends.github.io/IsItVegan/",
  "https://dishtune.com/",
  "https://www.dishtune.com/",
]
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

# DishTune-branded sign-in emails (supabase/templates/) are written and
# ready, but Supabase's FREE tier rejects template changes while on the
# default shared mailer: "configure a custom SMTP provider or upgrade".
# To enable: set up custom SMTP (dashboard → Project settings → Auth →
# SMTP; e.g. Resend's free tier), uncomment these blocks, and run
# `npx supabase config push`.
# [auth.email.template.magic_link]
# subject = "Sign in to DishTune"
# content_path = "./supabase/templates/magic_link.html"
#
# [auth.email.template.confirmation]
# subject = "Welcome to DishTune — confirm your email"
# content_path = "./supabase/templates/confirmation.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# ⚠ `supabase config push` run without a terminal attached APPLIES WITHOUT
# PROMPTING — there is no safe dry-run. A push with this section stale
# (enabled=false, empty credentials) once disabled the working Google
# provider and cleared its dashboard credentials.
#
# Failsafe: enabled=true with env-referenced credentials means a push with
# the env vars UNSET refuses to parse ("Missing required field client_id")
# instead of silently wiping the dashboard values. To intentionally push
# this section, first export both vars with the dashboard's values.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
